  <style>
    /* йҲ№вӮ¬йҲ№вӮ¬ Reset & Base йҲ№вӮ¬йҲ№вӮ¬ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #6c63ff;
      --accent-dark: #574fd6;
      --bg: #f4f5f9;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-sub: #888;
      --border: #ebebeb;

    }

    body {

    /* йҲ№вӮ¬йҲ№вӮ¬ жӨӨе •е„ҙйҸҚ?йҲ№вӮ¬йҲ№вӮ¬ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .topbar-title span { color: var(--accent); }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--bg);
      border-radius: 12px;
      padding: 8px 12px;
      gap: 8px;
    }

    .search-bar input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      outline: none;
      color: var(--text);
    }

    .search-bar input::placeholder { color: var(--text-sub); }

    .search-icon { color: var(--text-sub); font-size: 16px; }

    /* йҲ№вӮ¬йҲ№вӮ¬ йҸҚеӣ©о„·з»ӣж¶ўвӮ¬еӨӢзҲ® йҲ№вӮ¬йҲ№вӮ¬ */

      display: flex;
      gap: 8px;
      padding: 10px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .tag-bar::-webkit-scrollbar { display: none; }

    .tag-chip {

      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 13px;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .tag-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;

    /* йҲ№вӮ¬йҲ№вӮ¬ йҚ—пј„еў–йҚ’жҘ„гҖғ йҲ№вӮ¬йҲ№вӮ¬ */

      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-card {

      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    /* е®ёпёҝжҷ¶з»«иҜІзҖ·й‘№еҸүжҪҜ */

      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }

    .note-card.type-text::before  { background: #6c63ff; }
    .note-card.type-url::before   { background: #00b4d8; }
    .note-card.type-image::before { background: #f77f00; }

    .card-header {

      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-type-icon { font-size: 15px; }

    .card-time {

      color: var(--text-sub);
      margin-left: auto;
    }

    .card-content {

      line-height: 1.65;

    .card-content.url-content a {

    .card-image {

      padding-top: 8px;

    .card-btn {

      border: none;
      font-size: 13px;
      color: var(--text-sub);
